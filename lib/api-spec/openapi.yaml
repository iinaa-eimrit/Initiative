openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Initiative platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: initiatives
    description: Initiative operations
  - name: volunteers
    description: Volunteer operations
  - name: donations
    description: Donation operations
  - name: updates
    description: Initiative update operations
  - name: ai
    description: AI services
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /initiatives:
    get:
      operationId: listInitiatives
      tags: [initiatives]
      summary: List all initiatives
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of initiatives
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Initiative"
    post:
      operationId: createInitiative
      tags: [initiatives]
      summary: Create a new initiative
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInitiativeInput"
      responses:
        "201":
          description: Created initiative
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Initiative"

  /initiatives/{id}:
    get:
      operationId: getInitiative
      tags: [initiatives]
      summary: Get a single initiative with full detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Initiative detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitiativeDetail"
        "404":
          description: Not found

  /initiatives/{id}/volunteer:
    post:
      operationId: volunteerForInitiative
      tags: [volunteers]
      summary: Volunteer for an initiative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VolunteerInput"
      responses:
        "201":
          description: Volunteered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Volunteer"

  /initiatives/{id}/donate:
    post:
      operationId: donateToInitiative
      tags: [donations]
      summary: Donate to an initiative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DonationInput"
      responses:
        "201":
          description: Donation recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donation"

  /initiatives/{id}/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [donations]
      summary: Get donor leaderboard
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /initiatives/{id}/updates:
    get:
      operationId: getInitiativeUpdates
      tags: [updates]
      summary: Get updates timeline for an initiative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of updates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InitiativeUpdate"
    post:
      operationId: createInitiativeUpdate
      tags: [updates]
      summary: Post an update for an initiative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUpdateInput"
      responses:
        "201":
          description: Update created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitiativeUpdate"

  /initiatives/{id}/suggested-volunteers:
    get:
      operationId: getSuggestedVolunteers
      tags: [volunteers]
      summary: Get AI-suggested volunteers for an initiative
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Suggested volunteer matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VolunteerSuggestion"

  /ai/generate-plan:
    post:
      operationId: generateInitiativePlan
      tags: [ai]
      summary: AI-generate a structured initiative plan from a description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeneratePlanInput"
      responses:
        "200":
          description: Generated initiative structure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeneratedPlan"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    StructuredPlan:
      type: object
      properties:
        problemStatement:
          type: string
        executionSteps:
          type: array
          items:
            type: string
        estimatedBudget:
          type: number
        suggestedRoles:
          type: array
          items:
            type: string
        milestonesTimeline:
          type: array
          items:
            $ref: "#/components/schemas/MilestoneTimeline"
      required:
        - problemStatement
        - executionSteps
        - estimatedBudget
        - suggestedRoles
        - milestonesTimeline

    MilestoneTimeline:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        targetAmount:
          type: number
        durationWeeks:
          type: integer
      required:
        - title
        - description
        - targetAmount
        - durationWeeks

    TrustScore:
      type: object
      properties:
        overall:
          type: integer
        breakdown:
          type: object
          properties:
            updatesScore:
              type: integer
            milestonesScore:
              type: integer
            volunteersScore:
              type: integer
            fundingScore:
              type: integer
          required:
            - updatesScore
            - milestonesScore
            - volunteersScore
            - fundingScore
      required:
        - overall
        - breakdown

    Initiative:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        category:
          type: string
        location:
          type: string
        status:
          type: string
          enum: [active, completed, paused]
        lifecycleStage:
          type: string
          enum: [idea, planning, active, impact_delivered]
        fundingGoal:
          type: number
        fundingRaised:
          type: number
        volunteerCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        creatorName:
          type: string
        imageUrl:
          type: string
          nullable: true
        structuredPlan:
          $ref: "#/components/schemas/StructuredPlan"
          nullable: true
        trustScore:
          $ref: "#/components/schemas/TrustScore"
      required:
        - id
        - title
        - description
        - category
        - location
        - status
        - lifecycleStage
        - fundingGoal
        - fundingRaised
        - volunteerCount
        - createdAt
        - creatorName
        - trustScore

    InitiativeDetail:
      allOf:
        - $ref: "#/components/schemas/Initiative"
        - type: object
          properties:
            milestones:
              type: array
              items:
                $ref: "#/components/schemas/Milestone"
            volunteers:
              type: array
              items:
                $ref: "#/components/schemas/Volunteer"
            topDonors:
              type: array
              items:
                $ref: "#/components/schemas/LeaderboardEntry"
            updates:
              type: array
              items:
                $ref: "#/components/schemas/InitiativeUpdate"
          required:
            - milestones
            - volunteers
            - topDonors
            - updates

    Milestone:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        targetAmount:
          type: number
        fundsLocked:
          type: number
        status:
          type: string
          enum: [pending, active, completed]
        order:
          type: integer
      required:
        - id
        - title
        - description
        - targetAmount
        - fundsLocked
        - status
        - order

    Volunteer:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        message:
          type: string
          nullable: true
        skills:
          type: string
          nullable: true
        matchedScore:
          type: number
          nullable: true
        joinedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - joinedAt

    VolunteerSuggestion:
      type: object
      properties:
        name:
          type: string
        skills:
          type: array
          items:
            type: string
        matchScore:
          type: integer
        reason:
          type: string
        avatarInitials:
          type: string
      required:
        - name
        - skills
        - matchScore
        - reason
        - avatarInitials

    Donation:
      type: object
      properties:
        id:
          type: integer
        donorName:
          type: string
        amount:
          type: number
        message:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - donorName
        - amount
        - createdAt

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        donorName:
          type: string
        totalAmount:
          type: number
        donationCount:
          type: integer
      required:
        - rank
        - donorName
        - totalAmount
        - donationCount

    InitiativeUpdate:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        imageUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - content
        - createdAt

    CreateInitiativeInput:
      type: object
      properties:
        title:
          type: string
          minLength: 3
          maxLength: 100
        description:
          type: string
          minLength: 10
        category:
          type: string
        location:
          type: string
        fundingGoal:
          type: number
          minimum: 0
        creatorName:
          type: string
        imageUrl:
          type: string
          nullable: true
        structuredPlan:
          type: object
          nullable: true
        lifecycleStage:
          type: string
          enum: [idea, planning, active, impact_delivered]
      required:
        - title
        - description
        - category
        - location
        - fundingGoal
        - creatorName

    VolunteerInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        message:
          type: string
          nullable: true
        skills:
          type: string
          nullable: true
      required:
        - name
        - email

    DonationInput:
      type: object
      properties:
        donorName:
          type: string
        amount:
          type: number
          minimum: 1
        message:
          type: string
          nullable: true
      required:
        - donorName
        - amount

    CreateUpdateInput:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        imageUrl:
          type: string
          nullable: true
      required:
        - title
        - content

    GeneratePlanInput:
      type: object
      properties:
        description:
          type: string
          minLength: 5
        category:
          type: string
      required:
        - description

    GeneratedPlan:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        category:
          type: string
        location:
          type: string
        fundingGoal:
          type: number
        structuredPlan:
          $ref: "#/components/schemas/StructuredPlan"
      required:
        - title
        - description
        - category
        - location
        - fundingGoal
        - structuredPlan
