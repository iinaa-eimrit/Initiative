kind = "web"
previewPath = "/"
title = "Initiative"
version = "1.0.0"
id = "artifacts/initiative"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = ["/"]
localPort = 25690

[services.development]
run = "pnpm --filter @workspace/initiative run dev"

[services.production]
serve = "static"
build = ["pnpm", "--filter", "@workspace/initiative", "run", "build"]

[services.production.env]
PORT = "25690"
BASE_PATH = "/"

[services.env]
PORT = "25690"
BASE_PATH = "/"
